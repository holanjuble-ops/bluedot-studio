<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>칼럼 페이지 시안 · BlueDot Studio</title>

<link rel="stylesheet" href="../_ds/bluedot-studio-design-system-9f5b7cf1-ebeb-4a5e-8875-3aea1c7e4b44/colors_and_type.css" />

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); background: #f0eee9; }
  h1, h2, h3, h4, p { margin: 0; word-break: keep-all; text-wrap: pretty; }
  #root-loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: var(--bd-gray-400); font-size: 14px; letter-spacing: 0.04em; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0A0E1A">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0A0E1A"/>
    <rect x="360" y="250" width="220" height="300" rx="16" fill="none" stroke="#6E8BFF" stroke-width="6" opacity="0.5"/>
    <rect x="620" y="250" width="220" height="300" rx="16" fill="none" stroke="#6E8BFF" stroke-width="6" opacity="0.5"/>
    <circle cx="600" cy="160" r="30" fill="#1547FF"/>
    <text x="600" y="640" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="44" font-weight="700" text-anchor="middle">칼럼 시안</text>
  </svg>
</template>

<div id="root"><div id="root-loading">칼럼 시안 · 로딩 중</div></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Lucide icons (BdLogo doesn't need it, but shared.jsx Icon does) -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- user-fillable image slots -->
<script src="../image-slot.js"></script>

<!-- shared primitives from the main site (provides BdLogo, Kicker, etc.) -->
<script type="text/babel" src="../scripts/shared.jsx"></script>

<!-- canvas + column directions -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="cols-shared.jsx"></script>
<script type="text/babel" src="col-studio.jsx"></script>
<script type="text/babel" src="col-magazine.jsx"></script>
<script type="text/babel" src="col-journal.jsx"></script>
<script type="text/babel" src="col-hybrid.jsx"></script>

<script type="text/babel" data-presets="react">
  const ColCanvas = window.DesignCanvas;
  const ColSection = window.DCSection;
  const ColArtboard = window.DCArtboard;
  const W = 1180;

  function Mount() {
    return (
      <ColCanvas>
        <ColSection id="column" title="칼럼 페이지 시안" subtitle="목록(리스트) 페이지 · 클릭하면 확대 — ④ 조합안이 추천">
          <ColArtboard id="hybrid" label="④ 조합 · ①제목+②리스트 (추천)" width={W} height={2420}>
            {React.createElement(window.ColHybrid)}
          </ColArtboard>
          <ColArtboard id="studio" label="① 스튜디오 · 메인 동일 톤" width={W} height={1660}>
            {React.createElement(window.ColStudio)}
          </ColArtboard>
          <ColArtboard id="magazine" label="② 매거진 · 에디토리얼" width={W} height={2380}>
            {React.createElement(window.ColMagazine)}
          </ColArtboard>
          <ColArtboard id="journal" label="③ 다크 갤러리 · 저널" width={W} height={2080}>
            {React.createElement(window.ColJournal)}
          </ColArtboard>
        </ColSection>
      </ColCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Mount />);
</script>
</body>
</html>
