<style>
  /* ---- Premium palette extensions (deep navy + soft elevation) ---- */
  :root {
    --bd-navy:        #0A1330;   /* deep navy for dark sections (warmer, richer than pure ink) */
    --bd-navy-soft:   #121C3D;
    --bd-navy-line:   rgba(255,255,255,0.10);
    --shadow-soft:    0 1px 2px rgba(10,14,26,0.05), 0 8px 28px rgba(10,19,48,0.07);
    --shadow-soft-lg: 0 2px 4px rgba(10,14,26,0.06), 0 20px 48px rgba(10,19,48,0.12);
    --shadow-xl:      0 4px 10px rgba(10,14,26,0.05), 0 32px 64px rgba(8,16,40,0.16);
    /* radial navy→black depth field for dark sections */
    --grad-depth:     radial-gradient(130% 120% at 50% 0%, #0B1B42 0%, #060C20 55%, #03060F 100%);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: #FFFFFF;
    color: var(--bd-ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--bd-blue); color: #fff; }
  h1, h2, h3, h4, p { margin: 0; word-break: keep-all; text-wrap: pretty; }
  a { color: inherit; }
  button { font-family: inherit; }

  /* ---- Scroll reveal ----
     Opacity stays 1 at ALL times so content is never blank in throttled/frozen
     iframes, print, PDF, or html-to-image (where the CSS transition clock may not
     advance — an opacity fade starting at 0 would stick at 0 = invisible). The
     elegance comes from an unhurried, long-travel upward glide instead. */
  .reveal { transform: translateY(34px); transition: transform 1s var(--ease-out); }
  .reveal--in { transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) {
    .reveal { transform: none; transition: none; }
  }

  /* ---- Cinematic hero light sweep (implies a live studio video) ---- */
  @keyframes bd-lightsweep {
    0%   { transform: translate3d(-30%, -20%, 0) rotate(8deg); opacity: 0; }
    35%  { opacity: 0.5; }
    100% { transform: translate3d(40%, 30%, 0) rotate(8deg); opacity: 0; }
  }
  .hero-sweep {
    position: absolute; inset: -30%;
    background: radial-gradient(closest-side, rgba(110,139,255,0.18), transparent 70%);
    filter: blur(20px);
    animation: bd-lightsweep 9s var(--ease-in-out) infinite;
    pointer-events: none;
  }
  /* frosted translucent card surface */
  .bd-frost {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px) saturate(160%);
    -webkit-backdrop-filter: blur(10px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.12);
  }

  /* ---- Typing caret ---- */
  @keyframes bd-caret { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .bd-caret { display: inline-block; animation: bd-caret 1s steps(1) infinite; }

  /* ---- Pulse CTA ---- */
  @keyframes bd-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(21,71,255,0.40); }
    70%  { box-shadow: 0 0 0 16px rgba(21,71,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(21,71,255,0); }
  }
  .pulse-cta { animation: bd-pulse 2.2s var(--ease-in-out) infinite; }

  /* ---- Hero reel sheen (implies live video) ---- */
  @keyframes bd-sheen {
    0%   { transform: translateY(-60%) rotate(8deg); opacity: 0; }
    40%  { opacity: 0.28; }
    100% { transform: translateY(160%) rotate(8deg); opacity: 0; }
  }
  .reel-sheen {
    position: absolute; inset: -40% -20%;
    background: linear-gradient(180deg, transparent, rgba(110,139,255,0.22), transparent);
    animation: bd-sheen 6s var(--ease-in-out) infinite;
    pointer-events: none;
  }
  @keyframes bd-blink { 0%, 60% { opacity: 1; } 80%, 100% { opacity: 0.25; } }
  .rec-dot { animation: bd-blink 1.4s steps(1) infinite; }

  /* ---- Equalizer bars ---- */
  @keyframes bd-eq { 0%,100% { height: 18%; } 50% { height: 92%; } }
  .eq span { display:block; width: 3px; background: rgba(255,255,255,0.85); border-radius: 999px; animation: bd-eq 0.9s var(--ease-in-out) infinite; }

  /* ---- Hero scroll-down indicator ---- */
  @keyframes bd-scrollbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }
  .hero-scroll {
    display: inline-flex; align-items: center; justify-content: center;
    width: 46px; height: 46px; border-radius: 999px; cursor: pointer;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.9); padding: 0;
    transition: background 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
    animation: bd-scrollbob 1.8s var(--ease-in-out) infinite;
  }
  .hero-scroll:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.4); }
  /* bare variant — no circle, just the icon */
  .hero-scroll-bare {
    display: inline-flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 4px;
    color: rgba(255,255,255,0.45);
    transition: color 0.2s var(--ease-out);
  }
  .hero-scroll-bare:hover { color: rgba(255,255,255,0.8); }
  @media (prefers-reduced-motion: reduce) { .hero-scroll, .hero-scroll-bare { animation: none; } }

  /* ---- Problem empathy cards ---- */
  .prob-card {
    display: flex; align-items: center; gap: 13px;
    padding: 16px 18px; background: #fff;
    border: 1px solid var(--bd-line); border-radius: var(--r-sm);
    text-align: left;
    transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
  }
  .prob-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-1, 0 1px 2px rgba(10,14,26,0.06)); border-color: var(--bd-line-strong); }

  /* ---- Inputs ---- */
  .bd-field {
    width: 100%;
    height: 52px;
    padding: 0 16px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 500;
    color: var(--bd-ink);
    background: #fff;
    border: 1px solid var(--bd-line);
    border-radius: var(--r-sm);
    outline: none;
    transition: border-color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
  }
  textarea.bd-field { height: auto; min-height: 104px; padding: 14px 16px; line-height: 1.55; resize: vertical; }
  .bd-field::placeholder { color: var(--bd-gray-400); font-weight: 400; }
  .bd-field:focus { border-color: var(--bd-blue); box-shadow: 0 0 0 4px var(--bd-blue-50); }
  .bd-field.bd-field--err { border-color: var(--bd-danger); }

  /* ---- FAQ accordion ---- */
  .faq-item { border-bottom: 1px solid var(--bd-line); }
  .faq-q {
    width: 100%; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    padding: 28px 4px; text-align: left;
  }
  .faq-a-wrap { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.32s var(--ease-out); }
  .faq-a-wrap.open { grid-template-rows: 1fr; }
  .faq-a-inner { overflow: hidden; }
  .faq-icon { transition: transform 0.3s var(--ease-out); flex: none; }
  .faq-icon.open { transform: rotate(45deg); }

  /* ---- Process connector ---- */
  .proc-arrow { color: var(--bd-line-strong); flex: none; }

  /* ---- Generic link underline hover ---- */
  .link-ul { text-decoration: none; transition: opacity 0.2s var(--ease-out); }
  .link-ul:hover { opacity: 0.7; }

  /* hide native scrollbar on horizontal rails */
  .no-bar::-webkit-scrollbar { display: none; }
  .no-bar { -ms-overflow-style: none; scrollbar-width: none; }

  #root-loading {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    color: var(--bd-gray-400); font-size: 14px; letter-spacing: 0.04em;
  }

  /* keep the nav logo on one line once Pretendard loads */
  header > div > a:first-child { flex: none; }
  header > div > a:first-child div { white-space: nowrap; }
</style>
