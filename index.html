<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    font-family: var(--font-sans);
    background: #06080F;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  h1, h2, h3, p { margin: 0; word-break: keep-all; text-wrap: pretty; }

  /* centered question overlaying both worlds */
  .ask {
    position: fixed; z-index: 5; top: clamp(20px, 4vh, 40px); left: 50%;
    display: flex; align-items: center; gap: 10px;
    padding: clamp(9px, 1.2vh, 13px) clamp(16px, 2vw, 24px);
    border-radius: 999px;
    background: #fff;
    border: 1px solid rgba(255,255,255,0.9);
    box-shadow: 0 8px 28px rgba(0,0,0,0.28);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    pointer-events: none; white-space: nowrap;
    transform: translateX(-50%) translateY(-12px);
    opacity: 0;
    animation: askIn 0.9s var(--ease-out) 0.15s forwards;
  }
  .ask .dot {
    width: 8px; height: 8px; border-radius: 999px; background: var(--bd-blue); flex: none;
    animation: askPulse 3.2s ease-in-out infinite;
  }
  .ask span { font-size: clamp(15px, 1.6vw, 18px); font-weight: 700; letter-spacing: -0.02em; color: var(--bd-ink); }
  @keyframes askIn {
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes askPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(21,71,255,0.55); }
    50%      { box-shadow: 0 0 0 5px rgba(21,71,255,0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ask { animation: none; opacity: 1; transform: translateX(-50%); }
    .ask .dot { animation: none; }
  }
  @media (max-width: 719px) {
    .ask { top: 50%; transform: translate(-50%, calc(-50% - 12px)); animation: askInM 0.9s var(--ease-out) 0.15s forwards; }
    @keyframes askInM { to { opacity: 1; transform: translate(-50%, -50%); } }
  }

  /* full-bleed split: column on mobile (top/bottom), row on desktop (left/right) */
  .split { display: flex; flex-direction: column; height: 100%; }
  @media (min-width: 720px) { .split { flex-direction: row; } }

  .panel {
    position: relative; flex: 1; min-height: 0; min-width: 0;
    overflow: hidden; text-decoration: none; color: inherit;
    display: flex;
  }
  /* base "two worlds" color so it reads even before images are dropped */
  .panel--pro  { background: #0C1018; }
  .panel--biz  { background: #0A1B4D; }

  .panel-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s var(--ease-out); }
  .panel:hover .panel-img { transform: scale(1.045); }
  image-slot.panel-img.is-pro { --is-empty-bg: #0C1018; }
  image-slot.panel-img.is-biz { --is-empty-bg: #0A1B4D; }

  /* dark tone over imagery */
  .panel-tint { position: absolute; inset: 0; pointer-events: none; }
  .panel--pro .panel-tint { background: linear-gradient(160deg, rgba(8,11,20,0.78) 0%, rgba(8,11,20,0.55) 55%, rgba(8,11,20,0.82) 100%); }
  .panel--biz .panel-tint { background: linear-gradient(160deg, rgba(7,18,58,0.80) 0%, rgba(10,30,92,0.52) 55%, rgba(6,14,46,0.86) 100%); }

  /* giant ghost index */
  .panel-no {
    position: absolute; top: clamp(8px, 2vw, 28px); right: clamp(14px, 3vw, 48px);
    font-weight: 800; letter-spacing: -0.04em; line-height: 1;
    font-size: clamp(67px, 11vw, 154px);
    color: rgba(255,255,255,0.06);
    pointer-events: none; user-select: none;
  }

  /* content */
  .panel-inner {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; justify-content: center;
    gap: clamp(14px, 2vh, 26px);
    padding: clamp(28px, 5vw, 76px);
    padding-top: clamp(72px, 12vh, 130px);
    max-width: 600px;
  }
  .eyebrow {
    font-family: var(--font-mono); font-weight: 500;
    font-size: clamp(11px, 1.1vw, 14px); letter-spacing: 0.26em;
    text-transform: uppercase; color: rgba(255,255,255,0.55);
  }
  .panel--biz .eyebrow { color: rgba(255,255,255,0.62); }
  .title {
    font-size: clamp(44px, 5.4vw, 68px);
    font-weight: 800; letter-spacing: -0.04em; line-height: 1.04; color: #fff;
  }
  .sub {
    font-size: clamp(16px, 1.5vw, 17px); line-height: 1.55; font-weight: 500;
    color: rgba(255,255,255,0.66); max-width: 30ch;
    white-space: nowrap;
  }
  .cta {
    margin-top: clamp(4px, 1vh, 10px);
    display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
    color: rgba(255,255,255,0.62);
    font-size: clamp(14px, 1.4vw, 16px); font-weight: 600; letter-spacing: -0.01em;
    transition: opacity 0.2s var(--ease-out), color 0.2s var(--ease-out);
  }
  .cta svg { transition: transform 0.26s var(--ease-out); }
  .panel:hover .cta { color: #fff; }
  .panel:hover .cta svg { transform: translateX(5px); }

  /* thin divider line between the two worlds */
  .panel--biz::before {
    content: ""; position: absolute; z-index: 2; pointer-events: none;
    top: 0; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.12);
  }
  @media (min-width: 720px) {
    .panel--biz::before { top: 0; bottom: 0; left: 0; right: auto; width: 1px; height: auto; }
    .panel-inner { max-width: 520px; }
  }

  /* very short landscape phones: tighten */
  @media (max-width: 719px) and (max-height: 620px) {
    .sub { display: none; }
  }
  /* mobile: question sits on the seam, so panels don't need the desktop top-pad */
  @media (max-width: 719px) {
    .panel-inner { padding-top: clamp(28px, 5vw, 76px); gap: clamp(10px, 1.6vh, 16px); }
    .title { font-size: clamp(38px, 11vw, 50px); }
    .eyebrow { font-size: 10.5px; letter-spacing: 0.22em; }
    .sub { font-size: 13.5px; line-height: 1.5; }
    .cta { font-size: 13.5px; }
  }
</style>
